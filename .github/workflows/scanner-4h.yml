name: 📅 Crypto Scanner D1 — Cierre vela diaria

on:
  # La vela D1 de crypto cierra a las 00:00 UTC.
  # Corremos a las 00:30 UTC para tener la vela completa → 21:30 ART (UTC-3).
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

jobs:
  scan-d1:
    name: Scan D1 — BTC/USD y ETH/USD
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: 📅 Ejecutar scanner D1 + resumen
        env:
          ALPACA_API_KEY:     ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET:  ${{ secrets.ALPACA_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner.py --timeframe D1
