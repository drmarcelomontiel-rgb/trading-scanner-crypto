name: 📊 Crypto Scanner 4H — Resumen 14:00 ART (17:00 UTC)

on:
  # La vela de 4H cierra a las 16:00 UTC. Corremos a las 17:00 UTC
  # para tener la vela completa → 14:00 ART (UTC-3).
  schedule:
    - cron: "0 17 * * *"

jobs:
  scan-4h:
    name: Scan 4H — BTC/USD y ETH/USD
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: 📊 Ejecutar scanner 4H + resumen
        env:
          ALPACA_API_KEY:     ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET:  ${{ secrets.ALPACA_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner.py --timeframe 4H
